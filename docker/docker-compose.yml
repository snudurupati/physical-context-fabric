services:
  redis:
    image: redis:latest
    container_name: pcf-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped

  memgraph:
    image: memgraph/memgraph-platform
    container_name: pcf-memgraph
    ports:
      - "7687:7687"
      - "7444:7444"
      - "3000:3000"
    volumes:
      - memgraph-data:/var/lib/memgraph
    restart: unless-stopped

volumes:
  redis-data:
  memgraph-data:
